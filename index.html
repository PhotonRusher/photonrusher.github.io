	<div class="container">
		<div id="header-line">
			<span id="oasis-quote">

		</div>

		<div id="pin-section"></div>
		<div class="text-center" id="siteList"></div>
		<div id="no-results">검색 결과가 없습니다.</div>
		<div style="text-align:center;">
			<button id="visit-btn">방문 기록 ▾</button>
		</div>
		<div id="visit-panel"></div>
	</div>

	<br>

	<script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" crossorigin="anonymous"></script>

	<script>

		var _siteData = null;

		// 사이트 정보 가져오기
		function fGetSiteInfoFromServer( pTopic ) {
			var xmlhttp = new XMLHttpRequest();
			xmlhttp.onreadystatechange = function () {
				if (this.readyState == 4 && this.status == 200) {
					var jsObj = JSON.parse(this.responseText);
					fSetSiteList( jsObj );
				} else if (this.readyState == 4 && this.status == 404) {
					document.title = "The topic name [" + pTopic + "] is not available.";
				}
			};
			document.title = "startWeb::" + pTopic;
			var gUrl="./siteinfo/" + pTopic + ".json";
			xmlhttp.open("GET", gUrl, true);
			xmlhttp.send();
		}

		// json 데이터로 화면 표시
		function fSetSiteList( jsObj ) {
			_siteData = jsObj;
			var myObj = jsObj;
			var i, j, k, x = "";
			for (i in myObj.category) {
				var catName = myObj.category[i].categoryname;
				var catMain = catName.split('_')[0];   // _ 앞만 표시
				x += '<div class="category" data-cat="' + catName + '">';
				x += '<h4 class="cat-title">' + catMain + ' <span class="cat-arrow">▾</span></h4>';
				x += '<ul class="cat-body">';
				for (j in myObj.category[i].group) {
					x += "<li><div class=\"groups\"><span>";
					x += myObj.category[i].group[j].groupname + " ";
					x += "</span><div class=\"sites\">";
					for (k in myObj.category[i].group[j].sites) {
						var s = myObj.category[i].group[j].sites[k];
						if (!s.url || !s.name) continue;
						x += '<span class="lw">'
						   + visitDotHtml(s.url)
						   + '<a href="' + s.url + '">' + s.name + '</a>'
						   + '<span class="pb" data-url="' + s.url + '" data-name="' + s.name + '">☆</span>'
						   + '</span> ';
					}
					x += "</div></div></li>";
				}
				x += "</ul></div>";
			}
			$("#siteList").html(x);

			$('#pEname').text( myObj.ename );
			$('#topurl').text('https://photonrusher.github.io/?topic='+myObj.name);

			// 첫 카테고리 _ 뒤 문자열을 헤더 버전으로 표시
			var firstCat = myObj.category[0] ? myObj.category[0].categoryname : '';
			var verIdx = firstCat.indexOf('_');
			$('#data-ver').text(verIdx >= 0 ? firstCat.slice(verIdx + 1) : '');

			initCategories();
			renderPins();
			updatePinBtns();
			loadLinkStatus();
		}

		// 처음 방문 시 기본으로 닫힐 카테고리 (base name 기준)
		var DEFAULT_CLOSED = ['Daily-커뮤','HS-Link','Hobby-문화','Hobby-여행','Hobby-여가','Work-System','Programming','Programming-개발','Etc'];

		// 카테고리 접기/펼치기 초기화
		function initCategories() {
			var saved = {};
			try { saved = JSON.parse(localStorage.getItem('catState') || '{}'); } catch(e) {}

			$('.category').each(function() {
				var catName = $(this).data('cat');
				var catBase = catName.split('_')[0];  // 버전 제거 (Daily_v20260415 → Daily)
				var isCollapsed;
				if (typeof saved[catName] !== 'undefined') {
					isCollapsed = (saved[catName] === false);  // 사용자가 저장한 상태 우선
				} else {
					isCollapsed = DEFAULT_CLOSED.indexOf(catBase) >= 0;  // 첫 방문 기본값
				}
				if (isCollapsed) {
					$(this).find('.cat-body').hide();
					$(this).find('.cat-arrow').text('▸');
				}
			});

			$(document).off('click', '.cat-title').on('click', '.cat-title', function() {
				var $cat = $(this).closest('.category');
				var catName = $cat.data('cat');
				var $body = $cat.find('.cat-body');
				var $arrow = $cat.find('.cat-arrow');
				var isVisible = $body.is(':visible');

				$body.toggle(!isVisible);
				$arrow.text(isVisible ? '▸' : '▾');

				var s = {};
				try { s = JSON.parse(localStorage.getItem('catState') || '{}'); } catch(e) {}
				s[catName] = !isVisible;
				localStorage.setItem('catState', JSON.stringify(s));
			});
		}

		// ── 즐겨찾기 (Pins) ──────────────────────────────────
		function getPins() {
			try { return JSON.parse(localStorage.getItem('pins') || '[]'); } catch(e) { return []; }
		}
		function savePins(arr) { localStorage.setItem('pins', JSON.stringify(arr)); }

		function renderPins() {
			var pins = getPins();
			var $sec = $('#pin-section');
			if (!pins.length) { $sec.hide(); return; }
			var h = '<span class="pin-label">즐겨찾기</span><span class="pin-links">';
			pins.forEach(function(p) {
				h += '<span class="pin-item">'
				   + '<a href="' + p.url + '">' + p.name + '</a>'
				   + '<span class="pin-x" data-url="' + p.url + '">✕</span> '
				   + '</span>';
			});
			h += '</span>';
			$sec.html(h).show();
		}

		function updatePinBtns() {
			var pinUrls = getPins().map(function(p){ return p.url; });
			$('.pb').each(function() {
				var isPinned = pinUrls.indexOf($(this).data('url')) >= 0;
				$(this).text(isPinned ? '★' : '☆').toggleClass('on', isPinned);
			});
		}

		// ── 방문 기록 ──────────────────────────────────────────
		function getVisits() {
			try { return JSON.parse(localStorage.getItem('visits') || '{}'); } catch(e) { return {}; }
		}
		function recordVisit(url) {
			var v = getVisits(); v[url] = Date.now();
			localStorage.setItem('visits', JSON.stringify(v));
		}
		function visitDotHtml(url) {
			if (!url) return '';
			var v = getVisits(); if (!v[url]) return '';
			var age = Date.now() - v[url], day = 86400000;
			if (age < day)     return '<span class="vd vd-t" title="오늘 방문"></span>';
			if (age < day * 7) return '<span class="vd vd-w" title="이번 주 방문"></span>';
			return '';
		}

		// ── 영타→한글 자모 변환 ──────────────────────────────
		var ENG_JAMO = {
			q:'ㅂ',w:'ㅈ',e:'ㄷ',r:'ㄱ',t:'ㅅ',y:'ㅛ',u:'ㅕ',i:'ㅑ',o:'ㅐ',p:'ㅔ',
			a:'ㅁ',s:'ㄴ',d:'ㅇ',f:'ㄹ',g:'ㅎ',h:'ㅗ',j:'ㅓ',k:'ㅏ',l:'ㅣ',
			z:'ㅋ',x:'ㅌ',c:'ㅊ',v:'ㅍ',b:'ㅠ',n:'ㅜ',m:'ㅡ'
		};
		var CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
		var JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
		var JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

		// 한글 음절 → 자모 문자열 분해 (예: "한성" → "ㅎㅏㄴㅅㅓㅇ")
		function decomposeKo(str) {
			var out = '';
			for (var i = 0; i < str.length; i++) {
				var c = str.charCodeAt(i);
				if (c >= 0xAC00 && c <= 0xD7A3) {
					var off  = c - 0xAC00;
					var jong = off % 28;
					var jung = Math.floor(off / 28) % 21;
					var cho  = Math.floor(off / 28 / 21);
					out += CHO[cho] + JUNG[jung] + (jong ? JONG[jong] : '');
				} else {
					out += str[i];
				}
			}
			return out;
		}

		// 영타 문자열 → 자모 문자열 (예: "gkstjd" → "ㅎㅏㄴㅅㅓㅇ")
		function engToJamo(str) {
			var out = '';
			for (var i = 0; i < str.length; i++) {
				out += ENG_JAMO[str[i]] || str[i];
			}
			return out;
		}

		// 검색어가 영문자만으로 이루어졌는지 판별
		function isEngOnly(str) {
			return /^[a-z]+$/.test(str);
		}

		// ── 검색 ─────────────────────────────────────────────
		function doSearch(q) {
			if (!q) {
				// 검색 해제 → 저장된 접힘 상태 복원
				$('.sites .lw').show();
				$('.groups').show();
				$('.category').show();
				$('#no-results').hide();
				var saved = {};
				try { saved = JSON.parse(localStorage.getItem('catState') || '{}'); } catch(e) {}
				$('.category').each(function() {
					var catName = $(this).data('cat');
					var $body   = $(this).find('.cat-body');
					var $arrow  = $(this).find('.cat-arrow');
					if (saved[catName] === false) { $body.hide(); $arrow.text('▸'); }
					else                           { $body.show(); $arrow.text('▾'); }
				});
				return;
			}

			// 검색 중 → 모든 카테고리 펼침
			$('.cat-body').show();
			$('.cat-arrow').text('▾');

			// 영타 자모 변환 준비
			var jamoQ = isEngOnly(q) ? engToJamo(q) : '';

			// 링크 이름 + URL 필터링 (.lw 단위로 숨겨서 ☆도 같이 처리)
			$('.sites .lw').each(function() {
				var $a   = $(this).find('a');
				var text = $a.text().toLowerCase();
				var href = ($a.attr('href') || '').toLowerCase();
				var match = text.indexOf(q) >= 0 || href.indexOf(q) >= 0;
				if (!match && jamoQ) {
					match = decomposeKo(text).indexOf(jamoQ) >= 0;
				}
				this.style.display = match ? '' : 'none';
			});

			// 매칭 링크 없는 그룹 숨김
			var totalMatch = 0;
			$('.groups').each(function() {
				var hasMatch = false;
				$(this).find('.sites .lw').each(function() {
					if (this.style.display !== 'none') { hasMatch = true; totalMatch++; return false; }
				});
				this.style.display = hasMatch ? '' : 'none';
			});

			// 매칭 그룹 없는 카테고리 숨김
			$('.category').each(function() {
				var hasVisibleGroup = false;
				$(this).find('.groups').each(function() {
					if (this.style.display !== 'none') { hasVisibleGroup = true; return false; }
				});
				this.style.display = hasVisibleGroup ? '' : 'none';
			});

			$('#no-results').toggle(totalMatch === 0);
		}

		// ── 깨진 링크 상태 표시 ──────────────────────────────
		function loadLinkStatus() {
			fetch('./siteinfo/yk-linkstatus.json')
				.then(function(r) { return r.ok ? r.json() : null; })
				.then(function(data) {
					if (!data || !data.broken || !data.broken.length) return;
					var broken = data.broken;
					$('.pb').each(function() {
						if (broken.indexOf($(this).data('url')) >= 0) {
							$(this).before('<span class="broken-badge" title="링크 오류">⚠</span>');
						}
					});
				})
				.catch(function() {});
		}

		// ── 방문 기록 패널 ────────────────────────────────────
		function buildVisitPanel() {
			if (!_siteData) return;
			var v = getVisits();
			var now = Date.now(), day = 86400000, month3 = day * 90;

			var all = [];
			_siteData.category.forEach(function(cat) {
				var catMain = cat.categoryname.split('_')[0];
				cat.group.forEach(function(grp) {
					grp.sites.forEach(function(s) {
						if (!s.url || !s.name) return;
						all.push({ url: s.url, name: s.name, cat: catMain, grp: grp.groupname, last: v[s.url] || 0 });
					});
				});
			});

			all.sort(function(a, b) {
				if (!a.last && !b.last) return 0;
				if (!a.last) return -1;
				if (!b.last) return 1;
				return a.last - b.last;
			});

			var never  = all.filter(function(s) { return !s.last; });
			var old    = all.filter(function(s) { return s.last && (now - s.last) >= month3; });
			var recent = all.filter(function(s) { return s.last && (now - s.last) < month3; });

			function fmtDate(ts) {
				if (!ts) return '미방문';
				var d = new Date(ts);
				return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
			}
			function row(s, cls) {
				return '<div class="vp-row ' + cls + '">'
					+ '<span class="vp-name"><a href="' + s.url + '" target="_blank">' + s.name + '</a></span>'
					+ '<span class="vp-cat">' + s.cat + ' › ' + s.grp + '</span>'
					+ '<span class="vp-date">' + fmtDate(s.last) + '</span>'
					+ '</div>';
			}

			var h = '<div class="vp-summary">전체 <b>' + all.length + '</b>개 &nbsp;|&nbsp; '
				+ '미방문 <b style="color:#555">' + never.length + '</b>개 &nbsp;|&nbsp; '
				+ '3개월이상 <b style="color:#777">' + old.length + '</b>개 &nbsp;|&nbsp; '
				+ '최근 <b style="color:#4a7a3a">' + recent.length + '</b>개</div>';

			if (never.length) {
				h += '<div class="vp-sec-title">미방문 (' + never.length + ')</div>';
				never.forEach(function(s) { h += row(s, 'vp-never'); });
			}
			if (old.length) {
				h += '<div class="vp-sec-title">3개월 이상 미방문 (' + old.length + ')</div>';
				old.forEach(function(s) { h += row(s, 'vp-old'); });
			}
			if (recent.length) {
				h += '<div class="vp-sec-title">3개월 이내 방문 (' + recent.length + ')</div>';
				recent.forEach(function(s) { h += row(s, 'vp-recent'); });
			}

			$('#visit-panel').html(h);
		}

		// 주소 파라미터 값 가져오기
		function getUrlParameter(sParam) {
			var sPageURL = window.location.search.substring(1),
				sURLVariables = sPageURL.split('&'),
				sParameterName, i;
			for (i = 0; i < sURLVariables.length; i++) {
				sParameterName = sURLVariables[i].split('=');
				if (sParameterName[0] === sParam) {
					return sParameterName[1] === undefined ? true : decodeURIComponent(sParameterName[1]);
				}
			}
			return null;
		}

		$(function () {

			var topic = getUrlParameter('topic');

			if(typeof topic == "undefined" || topic == null || topic == "") {
				fGetSiteInfoFromServer( 'yk' );
			} else if(topic === "test") {
				const json = JSON.parse(document.getElementById("localjson").textContent);
				fSetSiteList(json);
				document.title = "startWeb:TEST";
			} else {
				fGetSiteInfoFromServer( topic );
			}

			// 검색 이벤트
			$('#searchInput').on('input', function() {
				doSearch($(this).val().trim().toLowerCase());
			});
			// ESC로 검색 초기화
			$('#searchInput').on('keydown', function(e) {
				if (e.key === 'Escape') { $(this).val(''); doSearch(''); }
			});

			// 링크 클릭 → 방문 기록
			$(document).on('click', '.sites a, .pin-item a', function() {
				recordVisit($(this).attr('href'));
			});

			// ☆/★ 클릭 → 즐겨찾기 토글
			$(document).on('click', '.pb', function(e) {
				e.preventDefault(); e.stopPropagation();
				var url  = $(this).data('url');
				var name = $(this).data('name');
				var pins = getPins();
				var idx  = -1;
				for (var pi = 0; pi < pins.length; pi++) { if (pins[pi].url === url) { idx = pi; break; } }
				if (idx >= 0) pins.splice(idx, 1);
				else          pins.push({url: url, name: name});
				savePins(pins);
				renderPins();
				updatePinBtns();
			});

			// 즐겨찾기 ✕ 클릭 → 제거
			$(document).on('click', '.pin-x', function() {
				var url  = $(this).data('url');
				var pins = getPins().filter(function(p){ return p.url !== url; });
				savePins(pins);
				renderPins();
				updatePinBtns();
			});

			// 방문 기록 버튼 토글
			$('#visit-btn').on('click', function() {
				var $p = $('#visit-panel');
				if ($p.is(':visible')) {
					$p.hide();
					$(this).text('방문 기록 ▾');
				} else {
					buildVisitPanel();
					$p.show();
					$(this).text('방문 기록 ▴');
				}
			});

			// '/' 키 → 검색창 포커스
			$(document).on('keydown', function(e) {
				if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
					e.preventDefault();
					$('#searchInput').focus();
				}
			});

			// 전체 펼치기 → 전체 닫기 → 기존 상태 (3단계 토글)
			var _expandPhase = 0;  // 0: 기본, 1: 전체 펼침, 2: 전체 닫힘
			var _stateBeforeExpand = null;

			$('#expand-all-btn').on('click', function() {
				var s = {};
				if (_expandPhase === 0) {
					_stateBeforeExpand = JSON.parse(localStorage.getItem('catState') || '{}');
					$('.category').each(function() {
						var catName = $(this).data('cat');
						$(this).find('.cat-body').show(); $(this).find('.cat-arrow').text('▾');
						s[catName] = true;
					});
					localStorage.setItem('catState', JSON.stringify(s));
					_expandPhase = 1; $(this).text('전체 닫기');
				} else if (_expandPhase === 1) {
					$('.category').each(function() {
						var catName = $(this).data('cat');
						$(this).find('.cat-body').hide(); $(this).find('.cat-arrow').text('▸');
						s[catName] = false;
					});
					localStorage.setItem('catState', JSON.stringify(s));
					_expandPhase = 2; $(this).text('기존 상태');
				} else {
					var saved = _stateBeforeExpand || {};
					$('.category').each(function() {
						var catName = $(this).data('cat');
						var catBase = catName.split('_')[0];
						var isOpen = (typeof saved[catName] !== 'undefined') ? saved[catName] : (DEFAULT_CLOSED.indexOf(catBase) < 0);
						if (isOpen) { $(this).find('.cat-body').show(); $(this).find('.cat-arrow').text('▾'); }
						else        { $(this).find('.cat-body').hide(); $(this).find('.cat-arrow').text('▸'); }
					});
					localStorage.setItem('catState', JSON.stringify(saved));
					_stateBeforeExpand = null;
					_expandPhase = 0; $(this).text('전체 펼치기');
				}
			});

		});

	</script>
